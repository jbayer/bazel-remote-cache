{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.11.0",
    "install": {
      "bazel-remote": {
        "pkg-path": "bazel-remote"
      }
    },
    "vars": {
      "BAZEL_REMOTE_GRPC_ADDRESS": "0.0.0.0:9092",
      "BAZEL_REMOTE_HTTP_ADDRESS": "0.0.0.0:9090",
      "BAZEL_REMOTE_MAX_SIZE": "10"
    },
    "hook": {
      "on-activate": "  mkdir -p \"$FLOX_ENV_CACHE/bazel-remote/data\"\n"
    },
    "profile": {
      "common": "echo \"\"\necho \"     ╔════════════════════════════════════════════════════════════╗\"\necho \"     ║              Bazel Remote Cache Server                     ║\"\necho \"     ╠════════════════════════════════════════════════════════════╣\"\necho \"     ║                                                            \"\necho \"     ║  Start the cache server:                                   \"\necho \"     ║  👉 flox services start                                    \"\necho \"     ║  👉 flox activate --start-services                         \"\necho \"     ║                                                            \"\necho \"     ║  Manage the service:                                       \"\necho \"     ║  👉 flox services status                                   \"\necho \"     ║  👉 flox services logs bazel-remote-cache                  \"\necho \"     ║  👉 flox services restart bazel-remote-cache               \"\necho \"     ║                                                            \"\necho \"     ║  Check cache status:                                       \"\necho \"     ║  👉 curl http://localhost:${BAZEL_REMOTE_HTTP_ADDRESS##*:}/status                      \"\necho \"     ║                                                            \"\necho \"     ║  Configure Bazel clients (.bazelrc):                       \"\necho \"     ║  build --remote_cache=grpc://CACHE_HOST:${BAZEL_REMOTE_GRPC_ADDRESS##*:}               \"\necho \"     ║                                                            \"\necho \"     ║  Or for localhost:                                         \"\necho \"     ║  build --remote_cache=grpc://localhost:${BAZEL_REMOTE_GRPC_ADDRESS##*:}                \"\necho \"     ║                                                            \"\necho \"     ║  Settings:                                                 \"\necho \"     ║    HTTP  = $BAZEL_REMOTE_HTTP_ADDRESS                                   \"\necho \"     ║    gRPC  = $BAZEL_REMOTE_GRPC_ADDRESS                                   \"\necho \"     ║    Cache = ${BAZEL_REMOTE_MAX_SIZE} GiB max                                      \"\necho \"     ╚════════════════════════════════════════════════════════════\"\necho \"\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    },
    "services": {
      "bazel-remote-cache": {
        "command": "  mkdir -p \"$FLOX_ENV_CACHE/bazel-remote/data\"\n  exec bazel-remote \\\n    --dir \"$FLOX_ENV_CACHE/bazel-remote/data\" \\\n    --http_address \"$BAZEL_REMOTE_HTTP_ADDRESS\" \\\n    --grpc_address \"$BAZEL_REMOTE_GRPC_ADDRESS\" \\\n    --max_size \"$BAZEL_REMOTE_MAX_SIZE\"\n",
        "is-daemon": true,
        "shutdown": {
          "command": "kill $WATCHDOG_PID 2>/dev/null; kill $SERVICE_PID 2>/dev/null"
        }
      }
    }
  },
